<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUR Search</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --border: #2a3441;
    --accent: #1793d1;
    --accent-dim: #1793d120;
    --text: #e6edf3;
    --text-dim: #7d8590;
    --text-muted: #484f58;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding-bottom: 2rem;
  }

  header {
    padding: 1.5rem 1rem 0;
    text-align: center;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1.25rem;
  }

  .logo-icon { width: 32px; height: 32px; }

  .logo-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.4rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .logo-text span { color: var(--text-dim); font-weight: 400; }

  .search-wrap {
    position: relative;
    max-width: 600px;
    margin: 0 auto;
    padding: 0 1rem;
  }

  .search-icon {
    position: absolute;
    left: 1.75rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }

  input[type="text"] {
    width: 100%;
    padding: 0.85rem 1rem 0.85rem 2.8rem;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 1rem;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    -webkit-appearance: none;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  input[type="text"]::placeholder { color: var(--text-muted); }

  .search-type {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    margin-top: 0.75rem;
    flex-wrap: wrap;
    padding: 0 1rem;
  }

  .type-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 0.3rem 0.75rem;
    border-radius: 20px;
    font-size: 0.78rem;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    transition: all 0.15s;
  }

  .type-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  .results-header {
    max-width: 600px;
    margin: 1.25rem auto 0.5rem;
    padding: 0 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .results-count {
    font-size: 0.8rem;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .sort-select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 0.25rem 0.5rem;
    border-radius: 6px;
    font-size: 0.78rem;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    outline: none;
  }

  .results {
    max-width: 600px;
    margin: 0 auto;
    padding: 0 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .pkg-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    text-decoration: none;
    display: block;
    color: inherit;
  }

  .pkg-card:hover, .pkg-card:focus {
    border-color: var(--accent);
    background: var(--surface2);
    outline: none;
  }

  .pkg-header {
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    margin-bottom: 0.35rem;
    flex-wrap: wrap;
  }

  .pkg-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1rem;
    font-weight: 600;
    color: var(--accent);
  }

  .pkg-version {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .pkg-badges {
    display: flex;
    gap: 0.35rem;
    margin-left: auto;
    flex-shrink: 0;
  }

  .badge {
    font-size: 0.68rem;
    padding: 0.15rem 0.45rem;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
  }

  .badge-ood { background: #f8514920; color: var(--red); border: 1px solid #f8514940; }
  .badge-orphan { background: #d2992220; color: var(--yellow); border: 1px solid #d2992240; }

  .pkg-desc {
    font-size: 0.88rem;
    color: var(--text-dim);
    line-height: 1.5;
    margin-bottom: 0.5rem;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .pkg-meta {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .meta-item {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .meta-item svg { flex-shrink: 0; }
  .meta-votes { color: var(--green); }
  .meta-pop { color: var(--purple); }

  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #000a;
    z-index: 100;
    padding: 1rem;
    overflow-y: auto;
  }

  .overlay.open { display: flex; align-items: flex-start; justify-content: center; padding-top: 2rem; }

  .detail-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: 100%;
    max-width: 560px;
    padding: 1.25rem;
    position: relative;
  }

  .detail-close {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 32px;
    height: 32px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    line-height: 1;
  }

  .detail-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 0.2rem;
    padding-right: 2.5rem;
  }

  .detail-ver {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 0.75rem;
  }

  .detail-desc {
    font-size: 0.9rem;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 1rem;
  }

  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .detail-row {
    background: var(--surface2);
    border-radius: 8px;
    padding: 0.6rem 0.75rem;
  }

  .detail-row-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 0.2rem;
  }

  .detail-row-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    color: var(--text);
    word-break: break-all;
  }

  .detail-row-val a { color: var(--accent); text-decoration: none; }

  .detail-actions {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .btn {
    flex: 1;
    min-width: 120px;
    padding: 0.65rem 1rem;
    border-radius: 8px;
    border: none;
    font-size: 0.85rem;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.35rem;
    transition: opacity 0.15s;
  }

  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }

  .install-cmd {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: var(--green);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
  }

  .copy-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 0.2rem;
    border-radius: 4px;
    display: flex;
    flex-shrink: 0;
  }

  .copy-btn:hover { color: var(--text); }

  .state-box {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-muted);
    font-size: 0.9rem;
    max-width: 600px;
    margin: 0 auto;
  }

  .state-icon { font-size: 2.5rem; margin-bottom: 0.75rem; display: block; }

  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 6px;
    height: 1em;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .skel-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
  }

  .skel-line { height: 0.9rem; margin-bottom: 0.5rem; }
  .skel-short { width: 40%; }
  .skel-mid { width: 65%; }
  .skel-full { width: 100%; }

  .deps-list {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    margin-top: 0.3rem;
  }

  .dep-tag {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.15rem 0.4rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-dim);
  }

  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.6rem 1.2rem;
    border-radius: 8px;
    font-size: 0.85rem;
    z-index: 200;
    transition: transform 0.2s ease;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M16 2L2 28h5.5L16 10l8.5 18H30L16 2z" fill="#1793d1"/>
      <path d="M10.5 22l2.5-5 2.5 5h-5z" fill="#0d1117"/>
    </svg>
    <span class="logo-text">aur<span>.find</span></span>
  </div>
  <div class="search-wrap">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="searchInput" placeholder="パッケージ名で検索…" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <div class="search-type">
    <button class="type-btn active" data-type="name-desc">name & desc</button>
    <button class="type-btn" data-type="name">name</button>
    <button class="type-btn" data-type="maintainer">maintainer</button>
    <button class="type-btn" data-type="depends">depends</button>
  </div>
</header>

<div class="results-header" id="resultsHeader" style="display:none">
  <span class="results-count" id="resultsCount"></span>
  <select class="sort-select" id="sortSelect">
    <option value="popularity">人気順</option>
    <option value="votes">投票順</option>
    <option value="name">名前順</option>
    <option value="updated">更新順</option>
  </select>
</div>

<div id="output"></div>

<div class="overlay" id="overlay">
  <div class="detail-card" id="detailCard">
    <button class="detail-close" id="detailClose">✕</button>
    <div id="detailContent"></div>
  </div>
</div>

<div class="toast" id="toast">コピーしました！</div>

<script>
let currentResults = [];
let searchType = 'name-desc';
let debounceTimer;

const searchInput = document.getElementById('searchInput');
const output = document.getElementById('output');
const overlay = document.getElementById('overlay');
const resultsHeader = document.getElementById('resultsHeader');
const resultsCount = document.getElementById('resultsCount');
const sortSelect = document.getElementById('sortSelect');

document.querySelectorAll('.type-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    searchType = btn.dataset.type;
    if (searchInput.value.trim().length >= 2) doSearch();
  });
});

searchInput.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  const q = searchInput.value.trim();
  if (q.length < 2) {
    output.innerHTML = '';
    resultsHeader.style.display = 'none';
    return;
  }
  showSkeleton();
  debounceTimer = setTimeout(doSearch, 380);
});

sortSelect.addEventListener('change', () => {
  if (currentResults.length) renderResults(currentResults);
});

async function doSearch() {
  const q = searchInput.value.trim();
  if (q.length < 2) return;

  try {
    // Cloudflare Pages Function プロキシ経由でリクエスト
    const url = `/api/aur?q=${encodeURIComponent(q)}&by=${searchType}`;
    const res = await fetch(url);
    const data = await res.json();

    if (data.error) { showError(data.error); return; }

    currentResults = data.results || [];
    renderResults(currentResults);
  } catch (e) {
    showError('ネットワークエラー。接続を確認してください。');
  }
}

function sortResults(results) {
  const s = sortSelect.value;
  return [...results].sort((a, b) => {
    if (s === 'popularity') return (b.Popularity || 0) - (a.Popularity || 0);
    if (s === 'votes') return (b.NumVotes || 0) - (a.NumVotes || 0);
    if (s === 'name') return a.Name.localeCompare(b.Name);
    if (s === 'updated') return (b.LastModified || 0) - (a.LastModified || 0);
    return 0;
  });
}

function renderResults(results) {
  const sorted = sortResults(results);
  resultsHeader.style.display = 'flex';
  resultsCount.textContent = `${results.length} 件`;

  if (results.length === 0) {
    output.innerHTML = `<div class="state-box"><span class="state-icon">🔍</span>「${escHtml(searchInput.value)}」は見つかりませんでした</div>`;
    return;
  }

  output.innerHTML = `<div class="results">${sorted.map(pkg => pkgCard(pkg)).join('')}</div>`;

  output.querySelectorAll('.pkg-card').forEach((el, i) => {
    el.addEventListener('click', () => showDetail(sorted[i]));
    el.addEventListener('keydown', e => { if (e.key === 'Enter') showDetail(sorted[i]); });
  });
}

function pkgCard(pkg) {
  const ood = pkg.OutOfDate ? '<span class="badge badge-ood">OOD</span>' : '';
  const orphan = !pkg.Maintainer ? '<span class="badge badge-orphan">orphan</span>' : '';
  const votes = pkg.NumVotes || 0;
  const pop = pkg.Popularity ? pkg.Popularity.toFixed(2) : '0.00';
  const updated = pkg.LastModified ? relTime(pkg.LastModified) : '';

  return `
  <div class="pkg-card" tabindex="0" role="button">
    <div class="pkg-header">
      <span class="pkg-name">${escHtml(pkg.Name)}</span>
      <span class="pkg-version">${escHtml(pkg.Version || '')}</span>
      <div class="pkg-badges">${ood}${orphan}</div>
    </div>
    <div class="pkg-desc">${escHtml(pkg.Description || '説明なし')}</div>
    <div class="pkg-meta">
      <span class="meta-item meta-votes">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>
        ${votes}
      </span>
      <span class="meta-item meta-pop">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        ${pop}
      </span>
      ${updated ? `<span class="meta-item"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${updated}</span>` : ''}
      ${pkg.Maintainer ? `<span class="meta-item"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>${escHtml(pkg.Maintainer)}</span>` : ''}
    </div>
  </div>`;
}

function showDetail(pkg) {
  const aurUrl = `https://aur.archlinux.org/packages/${pkg.Name}`;
  const snapshotUrl = `https://aur.archlinux.org/cgit/aur.git/snapshot/${pkg.Name}.tar.gz`;
  const updated = pkg.LastModified ? new Date(pkg.LastModified * 1000).toLocaleDateString('ja-JP') : '-';
  const submitted = pkg.FirstSubmitted ? new Date(pkg.FirstSubmitted * 1000).toLocaleDateString('ja-JP') : '-';
  const ood = pkg.OutOfDate ? `<span class="badge badge-ood">Out of Date</span>` : '';

  const deps = (pkg.Depends || []).map(d => `<span class="dep-tag">${escHtml(d)}</span>`).join('');
  const makedeps = (pkg.MakeDepends || []).map(d => `<span class="dep-tag">${escHtml(d)}</span>`).join('');
  const optdeps = (pkg.OptDepends || []).map(d => `<span class="dep-tag">${escHtml(d)}</span>`).join('');

  document.getElementById('detailContent').innerHTML = `
    <div class="detail-name">${escHtml(pkg.Name)} ${ood}</div>
    <div class="detail-ver">${escHtml(pkg.Version || '')}</div>
    <div class="detail-desc">${escHtml(pkg.Description || '説明なし')}</div>

    <div class="install-cmd">
      <span>yay -S ${escHtml(pkg.Name)}</span>
      <button class="copy-btn" onclick="copyCmd('yay -S ${escHtml(pkg.Name)}')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      </button>
    </div>

    <div class="detail-grid">
      <div class="detail-row">
        <div class="detail-row-label">投票</div>
        <div class="detail-row-val" style="color:var(--green)">${pkg.NumVotes || 0}</div>
      </div>
      <div class="detail-row">
        <div class="detail-row-label">人気度</div>
        <div class="detail-row-val" style="color:var(--purple)">${pkg.Popularity ? pkg.Popularity.toFixed(4) : '-'}</div>
      </div>
      <div class="detail-row">
        <div class="detail-row-label">メンテナー</div>
        <div class="detail-row-val">${pkg.Maintainer ? escHtml(pkg.Maintainer) : '<span style="color:var(--yellow)">orphan</span>'}</div>
      </div>
      <div class="detail-row">
        <div class="detail-row-label">ライセンス</div>
        <div class="detail-row-val">${(pkg.License || ['-']).join(', ')}</div>
      </div>
      <div class="detail-row">
        <div class="detail-row-label">登録日</div>
        <div class="detail-row-val">${submitted}</div>
      </div>
      <div class="detail-row">
        <div class="detail-row-label">最終更新</div>
        <div class="detail-row-val">${updated}</div>
      </div>
      ${pkg.URL ? `<div class="detail-row" style="grid-column:1/-1">
        <div class="detail-row-label">上流URL</div>
        <div class="detail-row-val"><a href="${escHtml(pkg.URL)}" target="_blank" rel="noopener">${escHtml(pkg.URL)}</a></div>
      </div>` : ''}
    </div>

    ${deps ? `<div class="detail-row" style="margin-bottom:0.5rem">
      <div class="detail-row-label">Depends</div>
      <div class="deps-list">${deps}</div>
    </div>` : ''}
    ${makedeps ? `<div class="detail-row" style="margin-bottom:0.5rem">
      <div class="detail-row-label">MakeDepends</div>
      <div class="deps-list">${makedeps}</div>
    </div>` : ''}
    ${optdeps ? `<div class="detail-row" style="margin-bottom:1rem">
      <div class="detail-row-label">OptDepends</div>
      <div class="deps-list">${optdeps}</div>
    </div>` : ''}
    ${!deps && !makedeps && !optdeps ? '<div style="margin-bottom:1rem"></div>' : ''}

    <div class="detail-actions">
      <a class="btn btn-primary" href="${aurUrl}" target="_blank" rel="noopener">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        AURページ
      </a>
      <a class="btn btn-secondary" href="${snapshotUrl}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Snapshot
      </a>
    </div>
  `;

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

document.getElementById('detailClose').addEventListener('click', closeDetail);
overlay.addEventListener('click', e => { if (e.target === overlay) closeDetail(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

function closeDetail() {
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

function copyCmd(cmd) {
  navigator.clipboard.writeText(cmd).then(() => showToast());
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function showSkeleton() {
  resultsHeader.style.display = 'none';
  output.innerHTML = `<div class="results">${Array(4).fill(`
    <div class="skel-card">
      <div class="skeleton skel-line skel-short" style="margin-bottom:0.6rem"></div>
      <div class="skeleton skel-line skel-full"></div>
      <div class="skeleton skel-line skel-mid"></div>
    </div>`).join('')}</div>`;
}

function showError(msg) {
  resultsHeader.style.display = 'none';
  output.innerHTML = `<div class="state-box"><span class="state-icon">⚠️</span>${escHtml(msg)}</div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function relTime(ts) {
  const diff = Date.now() / 1000 - ts;
  if (diff < 3600) return `${Math.floor(diff / 60)}分前`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}時間前`;
  if (diff < 86400 * 30) return `${Math.floor(diff / 86400)}日前`;
  if (diff < 86400 * 365) return `${Math.floor(diff / 86400 / 30)}ヶ月前`;
  return `${Math.floor(diff / 86400 / 365)}年前`;
}

searchInput.focus();
</script>
</body>
</html>
